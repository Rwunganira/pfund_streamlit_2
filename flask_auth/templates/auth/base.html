<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pandemic Fund M&E — {% block title %}Auth{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; }
    .auth-card {
      max-width: 440px; width: 100%; margin: 0 auto;
      background: #fff; border-radius: 12px;
      padding: 2.5rem 2rem; box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .brand { color: #2c3e50; font-weight: 700; font-size: 1.4rem; }
    .brand small { display: block; font-size: .85rem; font-weight: 400; color: #7f8c8d; }
    .btn-primary { background: #2c3e50; border-color: #2c3e50; }
    .btn-primary:hover { background: #1a252f; border-color: #1a252f; }
    .divider { border-top: 1px solid #ecf0f1; margin: 1.25rem 0; }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="auth-card">
    <div class="brand mb-4">
      🦠 Pandemic Fund M&amp;E
      <small>Monitoring &amp; Evaluation Intelligence Dashboard</small>
    </div>
    {% block content %}{% endblock %}
  </div>
</div>
</body>
</html>
